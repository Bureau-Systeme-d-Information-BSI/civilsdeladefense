services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: civilsdeladefense
      POSTGRES_PASSWORD: password
      POSTGRES_DB: civilsdeladefense_development
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civilsdeladefense"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    command: bash -c "yarn build && yarn build:css && bundle exec rails server -b 0.0.0.0"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DATABASE_URL: postgres://civilsdeladefense:password@db:5432/civilsdeladefense_development
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - bundle:/usr/local/bundle
      - node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  bundle:
  node_modules:
